server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    discovery:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
            - id: course-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/course/**
            - id: categoria-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/categorias/**
            - id: order-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/order/**
            - id: producto-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/productos/**
            - id: user-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/usuario/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway